<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Blog de Conducta — Historias desde las calles de Miami." />
  <link rel="icon" type="image/png" href="logo.png" />
  <title>Blog · Conducta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="index.html#hero" class="brand">
      <span>CONDUCTA</span>
    </a>
    <nav class="nav">
      <a href="index.html#imagenes" data-i18n="nav.images">Imágenes</a>
      <a href="index.html#donar" data-i18n="nav.donate">Donar</a>
      <a href="blog.html" class="nav-active" data-i18n="nav.blog">Blog</a>
      <a href="index.html#contacto" data-i18n="nav.contact">Contacto</a>
    </nav>
    <button id="lang-toggle" class="lang-toggle" aria-label="Toggle language">🇺🇸 English</button>
  </header>

  <main>
    <section class="section blog-hero">
      <div class="section-inner">
        <h1 class="section-title" data-i18n="blog.title">Blog</h1>
        <p class="section-sub" data-i18n="blog.sub">Historias desde las calles de Miami.</p>
      </div>
    </section>

    <section class="section section-blog">
      <div class="section-inner">
        <div id="blog-posts" class="blog-list">
          <p class="blog-loading" data-i18n="blog.loading">Cargando publicaciones…</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> Conducta · Miami</p>
    <p class="footer-tag" data-i18n="footer.tag">Sin filtro. Sin guión.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
